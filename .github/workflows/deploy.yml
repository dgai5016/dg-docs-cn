name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site-index/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install MkDocs Material and common plugins
        run: pip install mkdocs-material mkdocs-redirects mkdocs-section-index

      - name: Check if mdBook needed
        id: check_mdbook
        run: |
          if find . -name .meta.json -exec grep -l '"ssg"[[:space:]]*:[[:space:]]*"mdbook"' {} \; 2>/dev/null | grep -q .; then
            echo "needs_mdbook=true" >> $GITHUB_OUTPUT
          else
            echo "needs_mdbook=false" >> $GITHUB_OUTPUT
          fi

      - name: Install mdBook and plugins
        if: steps.check_mdbook.outputs.needs_mdbook == 'true'
        run: |
          # pin 到 0.4.x 系列：mdbook 0.5 重构了 preprocessor IPC 协议，
          # mdbook-toc/mdbook-tera 等生态包暂未适配。0.4.52 是 0.4 系列最新。
          cargo install mdbook --version 0.4.52 --locked
          cargo install mdbook-toc --version 0.14.2 --locked
          cargo install mdbook-tera --version 0.6.0 --locked

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build site-index
        working-directory: site-index
        run: |
          npm install
          npm run build

      - name: Prepare dist root
        run: |
          mkdir -p _site
          cp -r site-index/.vitepress/dist/* _site/

      - name: Discover and build projects
        env:
          REPO_ROOT: ${{ github.workspace }}
        run: |
          set -e
          for dir in "$REPO_ROOT"/*/; do
            proj_name=$(basename "$dir")
            # 跳过系统目录
            case "$proj_name" in
              site-index|.github|.claude|node_modules) continue ;;
            esac

            if [ ! -f "$dir.meta.json" ]; then
              echo "[skip] $proj_name: no .meta.json"
              continue
            fi

            ssg=$(node -e "console.log(require('$dir.meta.json').ssg || 'unknown')")
            echo "[build] $proj_name (ssg=$ssg)"

            case "$ssg" in
              mkdocs)
                (cd "$dir" && mkdocs build)
                mkdir -p "_site/$proj_name"
                cp -r "$dir/site/"* "_site/$proj_name/"
                ;;
              vitepress)
                (cd "$dir" && [ -f package.json ] && npm install || true)
                (cd "$dir" && npm run docs:build)
                mkdir -p "_site/$proj_name"
                cp -r "$dir/.vitepress/dist/"* "_site/$proj_name/"
                ;;
              mdbook)
                # 找 book.toml 所在目录（通常在 $dir/ 或 $dir/docs/）
                book_toml=$(find "$dir" -maxdepth 3 -name book.toml | head -1)
                if [ -z "$book_toml" ]; then
                  echo "[error] $proj_name: ssg=mdbook but no book.toml found"
                  continue
                fi
                book_dir=$(dirname "$book_toml")
                (cd "$book_dir" && mdbook build)
                mkdir -p "_site/$proj_name"
                cp -r "$book_dir/book/"* "_site/$proj_name/"
                ;;
              *)
                echo "[warn] $proj_name: unsupported ssg '$ssg', skipping"
                ;;
            esac
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
